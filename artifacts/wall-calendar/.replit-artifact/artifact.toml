kind = "web"
previewPath = "/"
title = "Interactive Wall Calendar"
version = "1.0.0"
id = "artifacts/wall-calendar"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24294

[services.development]
run = "pnpm --filter @workspace/wall-calendar run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wall-calendar", "run", "build" ]
publicDir = "artifacts/wall-calendar/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24294"
BASE_PATH = "/"
